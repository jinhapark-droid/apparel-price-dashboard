<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URBAN SIDE 가격 전략 대시보드</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #f4f6fa;
      --surface: #ffffff;
      --surface2: #f0f2f7;
      --surface3: #e8ebf3;
      --border: #dde1ed;
      --primary: #3b6ef8;
      --primary-dim: #e8effe;
      --accent: #e8305a;
      --green: #0ea865;
      --yellow: #d4920a;
      --orange: #e06b1a;
      --purple: #7c5cdb;
      --text: #1a1e2e;
      --text-dim: #5a6080;
      --text-muted: #9ba3c0;
      --danger: #e02244;
      --shadow: 0 2px 16px rgba(60,80,160,.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; font-size: 14px; line-height: 1.6; }

    /* HEADER */
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; }
    .brand { font-size: 17px; font-weight: 800; letter-spacing: -0.5px; }
    .brand .us { color: var(--primary); } .brand .rest { color: var(--text); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .sync-time { color: var(--text-muted); font-size: 12px; }
    .btn-refresh { background: var(--primary-dim); color: var(--primary); border: 1px solid var(--primary); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 700; transition: all .15s; }
    .btn-refresh:hover { background: var(--primary); color: #fff; }
    .btn-refresh.loading { opacity: .5; pointer-events: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin .7s linear infinite; }

    /* ALERT BANNER */
    .alert-banner { display: flex; align-items: center; gap: 10px; padding: 10px 24px; font-size: 13px; font-weight: 600; }
    .alert-banner.urgent { background: #fff1f4; border-bottom: 1px solid #ffd0da; color: #c0183a; }
    .alert-banner.notice { background: #f0faf4; border-bottom: 1px solid #b6e8cc; color: #0a7a44; }
    .alert-banner.info { background: #f0f4ff; border-bottom: 1px solid #c0d0fc; color: #2a50c8; }

    /* TABS */
    .tab-nav { display: flex; gap: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; overflow-x: auto; }
    .tab-btn { padding: 13px 20px; cursor: pointer; color: var(--text-dim); font-size: 13px; font-weight: 600; white-space: nowrap; border-bottom: 2px solid transparent; transition: all .15s; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-pane { display: none; padding: 24px; max-width: 1600px; margin: 0 auto; }
    .tab-pane.active { display: block; }

    /* CARDS */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .card-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .card-title .sub { font-size: 12px; font-weight: 400; color: var(--text-dim); margin-left: 4px; }

    /* KPI */
    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
    .kpi-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
    .kpi-val { font-size: 26px; font-weight: 800; line-height: 1.1; }
    .kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
    .c-blue { color: var(--primary); } .c-green { color: var(--green); } .c-yellow { color: var(--yellow); } .c-red { color: var(--accent); } .c-purple { color: var(--purple); } .c-orange { color: var(--orange); }

    /* TABLES */
    .tbl-wrap { overflow-x: auto; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: var(--surface2); color: var(--text-dim); padding: 9px 12px; text-align: left; font-weight: 600; white-space: nowrap; border-bottom: 1px solid var(--border); }
    td { padding: 9px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }
    .tr { text-align: right; font-variant-numeric: tabular-nums; font-family: 'JetBrains Mono','Courier New',monospace; }
    .tc { text-align: center; }

    /* BADGES */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .badge-active { background: #e6f9f0; color: var(--green); border: 1px solid #9adec1; }
    .badge-ended { background: #f0f0f4; color: var(--text-dim); border: 1px solid #d0d4e4; }
    .badge-upcoming { background: #edf1ff; color: var(--primary); border: 1px solid #afc0f8; }
    .badge-urgent { background: #ffeef2; color: var(--accent); border: 1px solid #f8a0b4; }

    /* DISCOUNT */
    .disc { display: inline-block; padding: 2px 8px; border-radius: 4px; font-weight: 800; font-size: 12px; font-family: monospace; }
    .d0 { background: #e6f9f0; color: #0a8050; }
    .d1 { background: #edf1ff; color: #2a50c8; }
    .d2 { background: #fff8e0; color: #9a6800; }
    .d3 { background: #fff2e0; color: #b84a00; }
    .d4 { background: #ffeef2; color: #c01030; }

    /* SELL-THROUGH */
    .st-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .st-bar { height: 6px; background: var(--surface3); border-radius: 3px; flex: 1; min-width: 60px; }
    .st-fill { height: 100%; border-radius: 3px; background: var(--green); transition: width .3s; }
    .st-val { font-size: 12px; font-weight: 700; font-family: monospace; min-width: 42px; text-align: right; }

    /* RETURN RATE */
    .ret-good { color: var(--green); font-weight: 600; }
    .ret-mid { color: var(--yellow); font-weight: 600; }
    .ret-bad { color: var(--accent); font-weight: 600; }
    .ret-danger { color: var(--danger); font-weight: 700; }

    /* MARGIN */
    .mg-good { color: var(--green); font-weight: 600; }
    .mg-ok { color: var(--yellow); font-weight: 600; }
    .mg-bad { color: var(--accent); font-weight: 600; }

    /* TIMELINE */
    .timeline { display: flex; flex-direction: column; gap: 12px; }
    .tl-row { display: flex; align-items: stretch; gap: 12px; }
    .tl-label { width: 160px; flex-shrink: 0; font-size: 12px; font-weight: 600; color: var(--text-dim); padding-top: 2px; }
    .tl-track { flex: 1; position: relative; height: 32px; background: var(--surface2); border-radius: 6px; overflow: hidden; }
    .tl-bar { position: absolute; top: 0; height: 100%; border-radius: 6px; display: flex; align-items: center; padding: 0 8px; font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; cursor: default; }
    .tl-header { display: flex; gap: 12px; margin-bottom: 8px; }
    .tl-header-label { width: 160px; flex-shrink: 0; }
    .tl-months { flex: 1; display: flex; }
    .tl-month { flex: 1; text-align: center; font-size: 11px; color: var(--text-muted); border-right: 1px solid var(--border); }
    .tl-today { position: absolute; top: 0; width: 2px; background: var(--accent); height: 100%; z-index: 10; }

    /* AI CARD */
    .ai-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; margin-bottom: 12px; }
    .ai-card:hover { border-color: #afc0f8; box-shadow: 0 2px 12px rgba(60,80,200,.08); }
    .ai-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .ai-name { font-weight: 700; font-size: 14px; }
    .ai-code { font-size: 11px; color: var(--text-muted); font-family: monospace; margin-top: 2px; }
    .ai-metrics { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .ai-metric { display: flex; flex-direction: column; align-items: center; background: var(--surface2); border-radius: 8px; padding: 8px 12px; min-width: 72px; }
    .ai-metric-label { font-size: 10px; color: var(--text-muted); margin-bottom: 2px; text-transform: uppercase; letter-spacing: .5px; }
    .ai-metric-val { font-size: 16px; font-weight: 800; font-family: monospace; }
    .ai-insight { background: var(--surface2); border-left: 3px solid var(--primary); border-radius: 0 8px 8px 0; padding: 12px 14px; font-size: 13px; line-height: 1.6; color: var(--text-dim); }
    .ai-insight.warn { border-left-color: var(--yellow); }
    .ai-insight.good { border-left-color: var(--green); }
    .ai-insight.alert { border-left-color: var(--accent); }
    .ai-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .ai-tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .tag-blue { background: var(--primary-dim); color: var(--primary); }
    .tag-green { background: #0d2d1a; color: var(--green); }
    .tag-yellow { background: #2d2000; color: var(--yellow); }
    .tag-red { background: #2d0a14; color: var(--accent); }
    .tag-purple { background: #1e1040; color: var(--purple); }

    /* STRATEGY BOXES */
    .strat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 20px; }
    .strat-box { border-radius: 12px; padding: 18px 20px; border: 1px solid; }
    .strat-box.now { background: #f0f4ff; border-color: #c0d0fc; }
    .strat-box.next { background: #f0faf5; border-color: #b6e8cc; }
    .strat-box.future { background: #fff6f0; border-color: #f0c098; }
    .strat-box.jp { background: #f8f0ff; border-color: #d4b8f8; }
    .strat-box-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .strat-item { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; font-size: 12px; border-bottom: 1px solid var(--border); }
    .strat-item:last-child { border-bottom: none; }
    .dot { width: 5px; height: 5px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }

    /* GRID LAYOUTS */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    @media (max-width: 1100px) { .grid2 { grid-template-columns: 1fr; } .grid3 { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 700px) { .grid3 { grid-template-columns: 1fr; } }

    /* FILTERS */
    .filter-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; align-items: center; }
    .filter-bar select, .filter-bar input[type=text] { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: 7px; font-size: 13px; outline: none; }
    .filter-bar select:focus, .filter-bar input:focus { border-color: var(--primary); }

    /* PROMO PERIOD CARD */
    .promo-period { background: var(--surface2); border-radius: 10px; padding: 14px 16px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
    .promo-name { font-weight: 700; font-size: 13px; }
    .promo-dates { font-size: 12px; color: var(--text-dim); }
    .promo-progress { height: 4px; background: var(--border); border-radius: 2px; margin-top: 4px; }
    .promo-progress-fill { height: 100%; border-radius: 2px; }

    /* LOADING */
    .loading-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .loader { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 14px; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* SECTION DIVIDER */
    .section-gap { margin-bottom: 20px; }
    .section-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .empty-note { text-align: center; padding: 32px; color: var(--text-muted); font-size: 13px; }

    .highlight-row td { background: #edf1ff !important; }
    .parity-alert { color: var(--accent); font-size: 11px; }
    .parity-ok { color: var(--green); font-size: 11px; }

    /* ============================================================
       SIMULATOR TAB STYLES
    ============================================================ */
    .sim-layout { display: grid; grid-template-columns: 400px 1fr; gap: 24px; align-items: start; }
    @media (max-width: 1100px) { .sim-layout { grid-template-columns: 1fr; } }

    /* Input panel */
    .sim-inputs { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; position: sticky; top: 70px; }
    .sim-section-title { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 12px; display: flex; align-items: center; gap: 8px; }
    .sim-section-title:first-child { margin-top: 0; }
    .sim-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .sim-field { margin-bottom: 14px; }
    .sim-label { font-size: 12px; font-weight: 600; color: var(--text-dim); margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
    .sim-label-hint { font-size: 11px; color: var(--text-muted); font-weight: 400; }
    .sim-input { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 9px; font-size: 15px; font-weight: 700; outline: none; transition: border-color .15s; }
    .sim-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,110,248,.12); }
    .sim-input-prefix { position: relative; }
    .sim-input-prefix input { padding-left: 36px; }
    .sim-input-prefix .prefix { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 13px; font-weight: 600; pointer-events: none; }

    /* Slider */
    .sim-slider-wrap { display: flex; flex-direction: column; gap: 6px; }
    .sim-slider-row { display: flex; align-items: center; gap: 12px; }
    .sim-slider { flex: 1; -webkit-appearance: none; height: 6px; border-radius: 3px; background: var(--border); outline: none; cursor: pointer; }
    .sim-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--primary); border: 3px solid white; box-shadow: 0 1px 6px rgba(59,110,248,.4); cursor: pointer; }
    .sim-slider-val { font-size: 18px; font-weight: 900; font-family: monospace; min-width: 54px; text-align: right; color: var(--primary); }
    .sim-slider-ticks { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); padding: 0 2px; }

    /* Preset chips */
    .preset-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .preset-chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; border: 1.5px solid var(--border); background: var(--surface2); color: var(--text-dim); transition: all .15s; white-space: nowrap; }
    .preset-chip:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-dim); }
    .preset-chip.active { background: var(--primary); border-color: var(--primary); color: white; }

    /* Result panel */
    .sim-results { display: flex; flex-direction: column; gap: 16px; }

    /* Big result card */
    .sim-result-main { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 24px; }
    .sim-result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
    .sim-result-item { text-align: center; padding: 16px; background: var(--surface2); border-radius: 10px; border: 1px solid var(--border); }
    .sim-result-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
    .sim-result-val { font-size: 28px; font-weight: 900; font-family: monospace; line-height: 1.1; }
    .sim-result-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    /* Margin bar */
    .sim-mg-bar-wrap { margin-top: 4px; }
    .sim-mg-bar-track { height: 12px; border-radius: 6px; background: var(--surface3); position: relative; overflow: hidden; }
    .sim-mg-bar-fill { height: 100%; border-radius: 6px; transition: width .4s ease, background .4s; }
    .sim-mg-bar-target { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--text-dim); }
    .sim-mg-bar-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); margin-top: 4px; }
    .sim-mg-verdict { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 9px; font-size: 13px; font-weight: 700; margin-top: 14px; }
    .verdict-ok { background: #e8f9f0; color: #0a7a44; border: 1px solid #9adec1; }
    .verdict-warn { background: #fffbec; color: #9a6800; border: 1px solid #f0d070; }
    .verdict-danger { background: #fff0f3; color: #c01030; border: 1px solid #f0a0b0; }

    /* Breakdown table */
    .sim-breakdown { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 20px 24px; }
    .sim-breakdown-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .sim-breakdown-row:last-child { border-bottom: none; font-weight: 800; font-size: 15px; }
    .sim-breakdown-label { font-size: 13px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
    .sim-breakdown-val { font-size: 13px; font-weight: 700; font-family: monospace; }
    .sim-breakdown-neg { color: var(--accent); }
    .sim-breakdown-pos { color: var(--green); }

    /* Scenario comparison */
    .sim-scenarios { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 20px 24px; }
    .scenario-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 9px; border: 1px solid var(--border); background: var(--surface2); margin-bottom: 8px; cursor: pointer; transition: all .15s; }
    .scenario-row:hover { border-color: var(--primary); background: var(--primary-dim); }
    .scenario-row.selected { border-color: var(--primary); background: var(--primary-dim); }
    .scenario-name { font-size: 13px; font-weight: 700; flex: 1; }
    .scenario-disc { font-size: 12px; font-family: monospace; font-weight: 700; }
    .scenario-mg { font-size: 14px; font-weight: 900; font-family: monospace; }
    .scenario-bar { flex: 2; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .scenario-bar-fill { height: 100%; border-radius: 4px; }

    /* PRICING PRINCIPLES PANEL */
    .principles-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; margin-bottom: 22px; }
    .principles-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; cursor: pointer; user-select: none; }
    .principles-title { font-size: 13px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
    .principles-title::before { content: ''; width: 3px; height: 14px; background: var(--primary); border-radius: 2px; display: inline-block; }
    .principles-toggle { font-size: 11px; color: var(--text-muted); }
    .principles-body { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
    @media (max-width: 900px) { .principles-body { grid-template-columns: 1fr; } }

    /* Discount spectrum */
    .disc-spectrum { display: flex; flex-direction: column; gap: 8px; }
    .disc-spectrum-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 4px; }
    .disc-level { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; border: 1px solid; position: relative; overflow: hidden; }
    .disc-level::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
    .disc-level.lv0 { background: #f0faf5; border-color: #b6e8cc; }
    .disc-level.lv0::before { background: var(--green); }
    .disc-level.lv1 { background: #f0f4ff; border-color: #c0d0fc; }
    .disc-level.lv1::before { background: var(--primary); }
    .disc-level.lv2 { background: #fffbf0; border-color: #f0d880; }
    .disc-level.lv2::before { background: var(--yellow); }
    .disc-level.lv3 { background: #fff6f0; border-color: #f0c098; }
    .disc-level.lv3::before { background: var(--orange); }
    .disc-level.lv4 { background: #fff0f3; border-color: #f0a0b0; }
    .disc-level.lv4::before { background: var(--accent); }
    .disc-level-range { font-size: 13px; font-weight: 800; font-family: monospace; width: 56px; flex-shrink: 0; }
    .disc-level-info { flex: 1; }
    .disc-level-name { font-size: 12px; font-weight: 700; line-height: 1.2; }
    .disc-level-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; line-height: 1.3; }
    .disc-level-tag { flex-shrink: 0; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }

// ============================================================

const SHEET_ID_PRICE = '1elpoQQ3CW4aNpcZfFJbu8q3ShUGKhNoZT2p3dGw4MFA';
const SHEET_ID_INV   = '1ykrQdlyTKAHmf3qgtfAwHLiLgNeFJ5WD3n0wmjxU4I0';
const URL_KR   = `https://docs.google.com/spreadsheets/d/${SHEET_ID_PRICE}/gviz/tq?tqx=out:csv&gid=0`;
const URL_JP   = `https://docs.google.com/spreadsheets/d/${SHEET_ID_PRICE}/gviz/tq?tqx=out:csv&gid=840724680`;
const URL_SELL = `https://docs.google.com/spreadsheets/d/${SHEET_ID_INV}/gviz/tq?tqx=out:csv&gid=1388188128`;
const TODAY = new Date('2026-06-29');

// ============================================================
// STATE
// ============================================================
let krRaw=[], jpRaw=[], sellRaw=[];
let krData=[], jpData=[], sellData=[];
let charts={};

// ============================================================
// UTILS
// ============================================================
const num = v => { if(!v||v===''||v==='-') return 0; return parseFloat(String(v).replace(/[^0-9.\-]/g,''))||0; };
const pct = v => { const s=String(v||'').replace('%','').trim(); return parseFloat(s)||0; };
const fmt = (n,s='') => (!n&&n!==0)?'-':n===0?'-':n.toLocaleString('ko-KR')+s;
const fmtP = v => v===0?'0%':v.toFixed(1)+'%';
const discClass = p => p===0?'d0':p<=15?'d1':p<=25?'d2':p<=35?'d3':'d4';
const mgClass = m => m>=55?'mg-good':m>=40?'mg-ok':'mg-bad';
const retClass = r => r<3?'ret-good':r<7?'ret-mid':r<10?'ret-bad':'ret-danger';

function getCat(name=''){
  const n=name.toLowerCase();
  if(n.includes('재킷')) return '재킷';
  if(n.includes('롱슬리브')) return '롱슬리브';
  if(n.includes('티셔츠')) return '티셔츠';
  if(n.includes('팬츠')) return '팬츠';
  if(n.includes('쇼츠')) return '쇼츠';
  if(n.includes('셔츠')) return '셔츠';
  if(n.includes('후디')) return '후디';
  if(n.includes('캡')) return '캡';
  if(n.includes('팩')||n.includes('백')) return '가방';
  return '기타';
}

function parseDate(s=''){
  if(!s) return null;
  const c=s.replace(/\./g,'-').replace(/\s/g,'').replace(/-+$/,'');
  try{ return new Date(c); } catch(e){ return null; }
}

function daysBetween(a,b){ return Math.round((b-a)/(1000*60*60*24)); }

function promoPct(start,end){
  const s=parseDate(start), e=parseDate(end);
  if(!s||!e) return 0;
  const total=daysBetween(s,e);
  const passed=Math.min(daysBetween(s,TODAY),total);
  return Math.max(0,Math.min(100,Math.round(passed/total*100)));
}

function promoStatus(end){
  const e=parseDate(end);
  if(!e) return 'unknown';
  const diff=daysBetween(TODAY,e);
  if(diff<0) return 'ended';
  if(diff<=3) return 'urgent';
  if(diff<=7) return 'closing';
  return 'active';
}

// ============================================================
// DATA LOADING
// ============================================================
async function loadCSV(url){
  return new Promise((res,rej)=>Papa.parse(url,{download:true,header:true,skipEmptyLines:true,complete:r=>res(r.data),error:rej}));
}

function parseKR(rows){
  return rows.map(r=>{
    const keys=Object.keys(r);
    const name=r['상품명']||r['제품']||'';
    if(!name) return null;
    const styleNum=r['스타일넘버']||'';
    const tagPrice=num(r['정가 TAG PRICE']||r['TAG PRICE']);
    const salePrice=num(r['판매가']);
    const normalPrice=num(r['상시판매가']);
    const discKey=keys.find(k=>k.includes('마케팅')&&k.includes('할인율'))||'';
    const normalDiscKey=keys.find(k=>k.includes('상시 대비 할인율'))||'';
    const discountRate=pct(discKey?r[discKey]:'')||pct(normalDiscKey?r[normalDiscKey]:'');
    const cost=num(r['원가']); const costRate=pct(r['원가율']);
    const margin=num(r['마진']); const marginRate=pct(r['마진율']);
    const fee=num(r['수수료']); const shipping=num(r['배송비']);
    const promo=r['프로모션']||''; const season=r['SEASON']||'';
    const start=r['시작일']||''; const end=r['종료일']||'';
    const color=r['옵션(컬러)']||''; const launch=r['출시월']||'';
    return {name,styleNum,tagPrice,salePrice,normalPrice,discountRate,cost,costRate,margin,marginRate,fee,shipping,promo,season,start,end,color,launch,cat:getCat(name),_raw:r};
  }).filter(Boolean);
}

function parseJP(rows){
  return rows.map(r=>{
    const name=r['제품']||r['상품명']||'';
    if(!name) return null;
    const keys=Object.keys(r);
    const styleNum=r['스타일넘버']||'';
    const tagJpy=r['JPY 기준 정가\nTAG PRICE']||r['JPY 기준 정가 TAG PRICE']||'';
    const saleJpy=r['최종 판매가']||'';
    const saleKrw=num(r['판매가 WON']);
    const discRate=pct(r['할인율']);
    const tagKrw=num(r['KRW 기준 정가\nTAG PRICE']||r['KRW 기준 정가 TAG PRICE']||r['KRW 기준 정가TAG PRICE']);
    const cost=num(r['원가']); const costRate=pct(r['원가율']);
    const margin=num(r['마진']); const marginRate=pct(r['마진율']);
    const multi=num(r['최종 배수']);
    const promo=r['프로모션']||''; const season=r['SEASON']||'';
    const start=r['시작일']||''; const end=r['종료일']||'';
    const color=r['옵션(컬러)']||''; const launch=r['출시월']||'';
    return {name,styleNum,tagJpy:num(tagJpy.replace(/[¥,]/g,'')),saleJpy:num(saleJpy.replace(/[¥,]/g,'')),saleKrw,discRate,tagKrw,cost,costRate,margin,marginRate,multi,promo,season,start,end,color,launch,cat:getCat(name),_raw:r};
  }).filter(Boolean);
}

function parseSell(rows){
  return rows.map(r=>{
    const name=(r['참고 자료: https://docs.google.com/spreadsheets/d/1xyTalQ_4BzuMwGU4Xuph8iNu7rXR29pRsJ77Osh5qtw/edit?gid=223561852#gid=223561852 상품명']||r['상품명']||'').replace(/\[.*?\]\s*/,'');
    if(!name) return null;
    const rawKeys=Object.keys(r);
    const nameKey=rawKeys[0];
    const fullName=r[nameKey]||'';
    const code=r['공급처상품명']||r[rawKeys[1]]||'';
    const season=r['시즌']||r[rawKeys[2]]||'';
    const line=r['라인']||r[rawKeys[3]]||'';
    const prod=num(r['생산 수량 총 수량']||r[rawKeys[5]]);
    const order=num(r['판매 주문']||r[rawKeys[6]]);
    const remain=num(r['잔여 수량']||r[rawKeys[7]]);
    const sellRate=pct(r['소진율']||r[rawKeys[8]]);
    const exchange=num(r['교환']||r[rawKeys[9]]);
    const returns=num(r['반품']||r[rawKeys[10]]);
    const retRate=pct(r['(교환+반품)/주문 비율']||r[rawKeys[11]]);
    // Normalize code: strip embedded color letters before the trailing -NNN number
    // e.g. "PL26S-FX4BLK-001" → "PL26S-FX4-001", "AC26S-CT2GRN-001-OS" → "AC26S-CT2-001"
    const normalCode=code.replace(/-OS$/i,'').replace(/[A-Z]{2,4}(-\d{3})$/,'$1');
    return {fullName,name,code,normalCode,season,line,prod,order,remain,sellRate,exchange,returns,retRate};
  }).filter(r=>r&&r.name&&r.season==='26SS');
}

// Dedupe by styleNum keeping latest start date
function dedupe(data){
  const map=new Map();
  data.forEach(r=>{
    if(!map.has(r.styleNum)){
      map.set(r.styleNum,{...r,colors:[r.color],count:1});
    } else {
      const ex=map.get(r.styleNum);
      if(r.color&&!ex.colors.includes(r.color)) ex.colors.push(r.color);
      ex.count++;
      if(r.start&&(!ex.start||r.start>ex.start)){
        const {colors,count}=ex;
        map.set(r.styleNum,{...r,colors,count});
      }
    }
  });
  return [...map.values()];
}

// Match sell data to price data by style number
function matchSell(styleNum, items){
  // Try exact match first (strip color from code)
  return items.find(s=>s.code&&s.code.startsWith(styleNum.replace(/-\d{3}$/,''))) ||
         items.find(s=>s.fullName&&s.fullName.includes(styleNum.split('-').slice(0,3).join('-')));
}

function getSellGroup(styleNum, items){
  // Match by normalCode exact — avoids cross-product collision (e.g. -001 vs -003 sharing same base)
  const matches=items.filter(s=>s.normalCode===styleNum);
  if(matches.length===0) return null;
  return {
    prod:matches.reduce((s,r)=>s+r.prod,0),
    order:matches.reduce((s,r)=>s+r.order,0),
    remain:matches.reduce((s,r)=>s+r.remain,0),
    sellRate:matches.reduce((s,r)=>s+r.sellRate,0)/matches.length,
    exchange:matches.reduce((s,r)=>s+r.exchange,0),
    returns:matches.reduce((s,r)=>s+r.returns,0),
    retRate:matches.length>0?(matches.reduce((s,r)=>s+r.exchange+r.returns,0)/Math.max(matches.reduce((s,r)=>s+r.order,0),1)*100):0,
    items:matches
  };
}

function renderAlerts(){

  let html='';
  krPromos.forEach(end=>{
    const st=promoStatus(end);
    const e=parseDate(end);
    const diff=e?daysBetween(TODAY,e):99;
    if(st==='urgent') html+=`<div class="alert-banner urgent">⚠️ 긴급: 국내 26SS 프로모션이 <strong>${diff===0?'오늘':diff+'일 후'}</strong> 종료됩니다 (${end}) — 7월 전략 즉시 확정 필요</div>`;
    else if(st==='closing') html+=`<div class="alert-banner notice">📌 국내 26SS 프로모션 ${diff}일 후 종료 (${end})</div>`;
    else if(st==='active') html+=`<div class="alert-banner info">✅ 국내 26SS 프로모션 진행 중 · ${diff}일 남음 (종료: ${end})</div>`;
  });
  jpPromos.forEach(end=>{
    const st=promoStatus(end);
    const e=parseDate(end);
    const diff=e?daysBetween(TODAY,e):99;
    if(st==='active'||st==='closing')
      html+=`<div class="alert-banner info">🇯🇵 일본 26SS 런칭프로모션 진행 중 · ${diff}일 남음 (종료: ${end})</div>`;
  });
  document.getElementById('alertBanners').innerHTML=html;
}

function renderHistory(){
  // Get all unique styles and their promotion history (all seasons)
  const allSeasons=[...new Set(krData.map(r=>r.season))].sort();

  // Build promo history per style
  const styleMap=new Map();
  krData.forEach(r=>{
    if(!r.styleNum||!r.name) return;
    const key=r.styleNum;
    if(!styleMap.has(key)) styleMap.set(key,{name:r.name,styleNum:key,cat:r.cat,promos:[]});
    const ex=styleMap.get(key);
    // Add promo if not already added
    const exists=ex.promos.find(p=>p.promo===r.promo&&p.start===r.start);
    if(!exists) ex.promos.push({promo:r.promo,season:r.season,start:r.start,end:r.end,disc:r.discountRate,sale:r.salePrice,tag:r.tagPrice,margin:r.marginRate});
  });

  const styles=[...styleMap.values()].filter(s=>s.promos.length>0).sort((a,b)=>a.cat.localeCompare(b.cat)||a.name.localeCompare(b.name));

  // Season summary table
  const seasonSummary=allSeasons.map(s=>{
    const items=krData.filter(r=>r.season===s);
    const styles=[...new Set(items.map(r=>r.styleNum))].length;
    const promos=[...new Set(items.map(r=>r.promo))];
    const avDisc=items.reduce((a,r)=>a+r.discountRate,0)/(items.length||1);
    const avMg=items.reduce((a,r)=>a+r.marginRate,0)/(items.length||1);
    return {season:s,styles,promos,avDisc,avMg};
  });

  let html=`
    <div class="section-label">시즌별 요약</div>
    <div class="card section-gap">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>시즌</th><th class="tc">스타일 수</th><th>프로모션</th><th class="tr">평균 할인율</th><th class="tr">평균 마진율</th></tr></thead>
          <tbody>
            ${seasonSummary.map(s=>`<tr class="${s.season==='26SS'?'highlight-row':''}">
              <td style="font-weight:700;${s.season==='26SS'?'color:var(--primary)':''}">${s.season}${s.season==='26SS'?' ← 현재':''}</td>
              <td class="tc">${s.styles}</td>
              <td style="font-size:12px;color:var(--text-dim)">${s.promos.slice(0,3).join(' · ')}${s.promos.length>3?' 외 '+(s.promos.length-3)+'개':''}</td>
              <td class="tr"><span class="disc ${discClass(s.avDisc)}">${fmtP(s.avDisc)}</span></td>
              <td class="tr ${mgClass(s.avMg)}">${fmtP(s.avMg)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="section-label">26SS 품목별 프로모션 이력</div>
    <div class="card">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>상품명</th><th>시즌</th><th>프로모션</th><th>기간</th><th class="tc">할인율</th><th class="tr">판매가</th><th class="tr">정가</th><th class="tr">마진율</th><th>상태</th></tr></thead>
          <tbody>
            ${styles.filter(s=>s.promos.some(p=>p.season==='26SS')).map(s=>
              s.promos.filter(p=>p.season==='26SS').map((p,i)=>`<tr>
                ${i===0?`<td rowspan="${s.promos.filter(pp=>pp.season==='26SS').length}" style="font-size:12px;font-weight:600;border-right:1px solid var(--border)">${s.name.replace('어반사이드 ','')}<br><span style="font-size:10px;font-family:monospace;color:var(--text-muted)">${s.styleNum}</span></td>`:''}
                <td><span style="font-size:10px;background:var(--primary-dim);color:var(--primary);padding:1px 6px;border-radius:3px">${p.season}</span></td>
                <td style="font-size:12px">${p.promo}</td>
                <td style="font-size:11px;color:var(--text-dim);white-space:nowrap">${p.start} ~ ${p.end}</td>
                <td class="tc"><span class="disc ${discClass(p.disc)}">${p.disc}%</span></td>
                <td class="tr">${fmt(p.sale,'원')}</td>
                <td class="tr" style="color:var(--text-muted)">${fmt(p.tag,'원')}</td>
                <td class="tr ${mgClass(p.margin)}">${fmtP(p.margin)}</td>
                <td><span class="badge ${promoStatus(p.end)==='ended'?'badge-ended':promoStatus(p.end)==='active'?'badge-active':promoStatus(p.end)==='urgent'?'badge-urgent':'badge-upcoming'}">${promoStatus(p.end)==='ended'?'종료':promoStatus(p.end)==='urgent'?'D-'+daysBetween(TODAY,parseDate(p.end)):'진행중'}</span></td>
              </tr>`).join('')
            ).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
  document.getElementById('pane-history').innerHTML=html;
}

function aiInsight(kr, jp, sg){
  const insights=[];
  const tags=[];
  let type='';

  // Sell-through
  if(sg){
    if(sg.sellRate>=100){ insights.push('전량 소진 완료 (소진율 100%)'); tags.push({t:'완판',c:'tag-green'}); }
    else if(sg.sellRate>=80){ insights.push(`소진율 ${fmtP(sg.sellRate)} — 양호하나 잔여 재고 ${sg.remain}개 처리 필요`); tags.push({t:'소진 양호',c:'tag-blue'}); }
    else { insights.push(`소진율 ${fmtP(sg.sellRate)} — 재고 ${sg.remain}개 적체 주의`); tags.push({t:'재고 주의',c:'tag-red'}); type='warn'; }

    // Return rate
    if(sg.retRate>=10){ insights.push(`교환+반품율 ${fmtP(sg.retRate)} — 10% 초과, 상세페이지·사이즈표 즉시 점검 권고`); tags.push({t:'반품율 높음',c:'tag-red'}); type='alert'; }
    else if(sg.retRate>=7){ insights.push(`교환+반품율 ${fmtP(sg.retRate)} — 주의 수준, 사이즈 가이드 강화 검토`); tags.push({t:'반품율 주의',c:'tag-yellow'}); if(!type) type='warn'; }
    else if(sg.retRate<3&&sg.order>0){ insights.push(`교환+반품율 ${fmtP(sg.retRate)} — 매우 낮음, 고객 만족도 우수`); tags.push({t:'만족도 우수',c:'tag-green'}); }
  }

  // Discount strategy
  if(kr.discountRate===0){ insights.push('무할인 정가 판매 — 브랜드 가치 유지에 기여'); tags.push({t:'정가 판매',c:'tag-green'}); if(!type) type='good'; }
  else if(kr.discountRate>=30){ insights.push(`${kr.discountRate}% 고할인 적용 — 마진율 ${fmtP(kr.marginRate)}으로 수익성 확인 필요`); tags.push({t:'고할인',c:'tag-yellow'}); }
  else { insights.push(`${kr.discountRate}% 할인으로 가격 경쟁력 확보`); tags.push({t:'할인 진행',c:'tag-blue'}); }

  // Margin
  if(kr.marginRate>=55){ insights.push(`마진율 ${fmtP(kr.marginRate)} — 우수한 수익성, 추가 할인 여력 있음`); tags.push({t:'고마진',c:'tag-green'}); if(!type) type='good'; }
  else if(kr.marginRate<40){ insights.push(`마진율 ${fmtP(kr.marginRate)} — 낮은 수익성 주의, 원가 대비 가격 재검토 권고`); tags.push({t:'저마진 주의',c:'tag-red'}); if(!type) type='warn'; }

  // KR vs JP parity
  if(jp&&jp.saleKrw>0&&kr.salePrice>0){
    const ratio=jp.saleKrw/kr.salePrice;
    if(ratio<0.85){ insights.push(`일본 환산가(${fmt(jp.saleKrw,'원')})가 국내(${fmt(kr.salePrice,'원')})보다 ${((1-ratio)*100).toFixed(0)}% 저렴 — 역직구 유인 가능성, 가격 정합성 검토 권고`); tags.push({t:'가격 정합 이슈',c:'tag-red'}); }
    else if(ratio>1.15){ insights.push(`일본 가격이 국내 대비 ${((ratio-1)*100).toFixed(0)}% 프리미엄 — 일본 시장 포지셔닝 양호`); tags.push({t:'JP 프리미엄',c:'tag-purple'}); }
    else { insights.push(`국내-일본 가격 격차 ${((ratio-1)*100).toFixed(0)}% — 양시장 가격 정합성 양호`); tags.push({t:'가격 정합',c:'tag-green'}); }
  }

  // Next action
  if(sg&&sg.sellRate>=100&&kr.discountRate===0){ insights.push('→ 다음 시즌 동일 정가 유지 권장 — 무할인 완판 성과'); }
  else if(sg&&sg.sellRate>=100&&kr.discountRate>0){ insights.push(`→ 할인 적용으로 완판 달성 — 초도 기획 수량 확대 또는 할인폭 소폭 축소 검토`); }

  return {insights,tags,type:type||'info'};
}

function filterAI(){
  const cat=document.getElementById('ai-cat').value;
  const search=document.getElementById('ai-search').value.toLowerCase();
  document.querySelectorAll('.ai-card').forEach(el=>{
    const show=(!cat||el.dataset.cat===cat)&&(!search||el.dataset.name.toLowerCase().includes(search));
    el.style.display=show?'':'none';
  });
}

function simGetVals(){
  const tag=parseFloat(document.getElementById('simTagPrice').value)||0;
  const cost=parseFloat(document.getElementById('simCost').value)||0;
  const fee=parseFloat(document.getElementById('simFee').value)||0;
  const disc=parseFloat(document.getElementById('simDisc').value)||0;
  const revShare=parseFloat(document.getElementById('simRevShare').value)||0;
  return {tag,cost,fee,disc,revShare};
}

function simCompute(tag,cost,fee,disc,revShare){
  const salePrice=tag*(1-disc/100);
  const feeAmt=salePrice*(fee/100);
  const revShareAmt=salePrice*(revShare/100);
  const discAmt=tag-salePrice;
  const marginAmt=salePrice-feeAmt-revShareAmt-cost;
  const marginRate=salePrice>0?marginAmt/salePrice*100:0;
  return {salePrice,feeAmt,revShareAmt,discAmt,marginAmt,marginRate};
}

function simCalc(){
  const {tag,cost,fee,disc,revShare}=simGetVals();
  document.getElementById('simDiscVal').textContent=disc+'%';
  document.getElementById('simRevShareVal').textContent=revShare+'%';

  const r=simCompute(tag,cost,fee,disc,revShare);

  // Update results
  document.getElementById('r_salePrice').textContent=fmt(Math.round(r.salePrice))+'원';
  document.getElementById('r_salePriceSub').textContent=`정가 대비 −${disc}%`;
  document.getElementById('r_marginAmt').textContent=fmt(Math.round(r.marginAmt))+'원';
  document.getElementById('r_marginRate').textContent=r.marginRate.toFixed(1)+'%';
  document.getElementById('r_marginRate').style.color=r.marginRate>=30?'var(--green)':r.marginRate>=15?'var(--yellow)':'var(--accent)';

  const barPct=Math.min(Math.max(r.marginRate,0),100);
  const barColor=r.marginRate>=30?'var(--green)':r.marginRate>=15?'var(--yellow)':'var(--accent)';
  document.getElementById('r_mgBarFill').style.width=barPct+'%';
  document.getElementById('r_mgBarFill').style.background=barColor;

  let verdictClass,verdictText;
  if(r.marginRate>=30){ verdictClass='verdict-ok'; verdictText=`✅ 마진 안전 구간 — 권장 30% 이상 충족 (${r.marginRate.toFixed(1)}%)`; }
  else if(r.marginRate>=15){ verdictClass='verdict-warn'; verdictText=`⚠️ 주의 구간 — 마진율 ${r.marginRate.toFixed(1)}% (권장 30% 미달)`; }
  else { verdictClass='verdict-danger'; verdictText=`🚨 위험 구간 — 마진율 ${r.marginRate.toFixed(1)}% (적자 또는 극저마진)`; }
  document.getElementById('r_verdict').className='sim-mg-verdict '+verdictClass;
  document.getElementById('r_verdict').textContent=verdictText;

  // Breakdown
  document.getElementById('bd_tag').textContent=fmt(tag)+'원';
  document.getElementById('bd_discPct').textContent=disc;
  document.getElementById('bd_discAmt').textContent=r.discAmt>0?'− '+fmt(Math.round(r.discAmt))+'원':'0원';
  document.getElementById('bd_sale').textContent=fmt(Math.round(r.salePrice))+'원';
  document.getElementById('bd_feePct').textContent=fee;
  document.getElementById('bd_feeAmt').textContent=r.feeAmt>0?'− '+fmt(Math.round(r.feeAmt))+'원':'0원';
  document.getElementById('bd_revSharePct').textContent=revShare;
  document.getElementById('bd_revShareAmt').textContent=r.revShareAmt>0?'− '+fmt(Math.round(r.revShareAmt))+'원':'0원';
  document.getElementById('bd_cost').textContent='− '+fmt(cost)+'원';
  const mgEl=document.getElementById('bd_margin');
  mgEl.textContent=(r.marginAmt>=0?'':'− ')+fmt(Math.abs(Math.round(r.marginAmt)))+'원 ('+r.marginRate.toFixed(1)+'%)';
  mgEl.className='sim-breakdown-val '+(r.marginAmt>=0?'sim-breakdown-pos':'sim-breakdown-neg');
}

function simSetFee(v){
  document.getElementById('simFee').value=v;
  simCalc();
}

function simApplyPreset(i){
  const p=SIM_PRESETS[i];
  document.getElementById('simDisc').value=p.disc;
  document.getElementById('simRevShare').value=p.revShare;
  document.querySelectorAll('.preset-chip[id^=preset_]').forEach((el,j)=>el.classList.toggle('active',j===i));
  simCalc();
}

function simLoadItem(){
  const kr26=dedupe(krData.filter(r=>r.season==='26SS'));
  const idx=parseInt(document.getElementById('simItemSelect').value);
  if(isNaN(idx)) return;
  const item=kr26[idx];
  if(!item) return;
  document.getElementById('simTagPrice').value=item.tagPrice||0;
  document.getElementById('simCost').value=item.cost||0;
  document.getElementById('simFee').value=item.fee||3;
  simCalc();
}

function renderScenarios(){
  const {tag,cost,fee}=simGetVals();
  const list=document.getElementById('simScenarioList');
  if(!list) return;
  list.innerHTML=SIM_PRESETS.map((p,i)=>{
    const r=simCompute(tag,cost,fee,p.disc,p.revShare);
    const col=r.marginRate>=30?'var(--green)':r.marginRate>=15?'var(--yellow)':'var(--accent)';
    return `<div class="scenario-row" onclick="simApplyPreset(${i})">
      <div class="scenario-name">${p.name}</div>
      <div class="scenario-disc" style="color:var(--text-muted);font-size:11px">할인 ${p.disc}% / 쉐어 ${p.revShare}%</div>
      <div class="scenario-bar"><div class="scenario-bar-fill" style="width:${Math.min(r.marginRate,100)}%;background:${col}"></div></div>
      <div class="scenario-mg" style="color:${col}">${r.marginRate.toFixed(1)}%</div>
    </div>`;
  }).join('');
}

function switchTab(id){
  const tabs=['summary','history','plan','ai','compare','simulator'];
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',tabs[i]===id));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+id).classList.add('active');
  if(id==='simulator'&&!document.getElementById('pane-simulator').innerHTML.trim()) renderSimulator();
}

// ============================================================
// LOAD ALL
// ============================================================
async function loadAll(){
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('loading'); btn.innerHTML='<span class="spin">↺</span> 로딩중';
  document.getElementById('syncTime').textContent='데이터 불러오는 중...';
  try{
    const [kr,jp,sell]=await Promise.all([loadCSV(URL_KR),loadCSV(URL_JP),loadCSV(URL_SELL)]);
    krRaw=kr; jpRaw=jp; sellRaw=sell;
    krData=parseKR(kr);
    jpData=parseJP(jp);
    sellData=parseSell(sell);
    renderAlerts();
    renderSummary();
    renderHistory();
    renderPlan();
    renderAI();
    renderCompare();
    const now=new Date();
    document.getElementById('syncTime').textContent=`업데이트: ${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  } catch(e){
    document.getElementById('syncTime').textContent='로드 실패';
    console.error(e);
  } finally {
    btn.classList.remove('loading'); btn.innerHTML='↺ 새로고침';
  }
}

loadAll();
</script>
